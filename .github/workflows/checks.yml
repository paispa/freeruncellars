name: Site Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML validity
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          # Blacklist matched against filename only (no path prefix)
          blacklist: >-
            chat-bubble.html
            email-template-single.html
            email-template-strip.html
          # Dot-only regex (no * glob chars) to suppress intentional style-in-body
          extra: --ignore-re not.allowed.as.child

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --exclude "localhost"
            --exclude "PAYMENT_LINK_HERE"
            --exclude "corsproxy.io"
            --exclude "tel:"
            --exclude "mailto:"
            --exclude "fonts.googleapis.com"
            --exclude "fonts.gstatic.com"
            --exclude "yelp.com"
            --exclude "instagram.com"
            --exclude "%7B%7B"
            ./**/*.html
          fail: true

      - name: JavaScript lint (HTML-embedded)
        run: npx --yes jshint --extract=auto ./**/*.html

      - name: Syntax-check serverless functions
        run: |
          for f in api/*.js; do
            node --check "$f" && echo "OK: $f" || exit 1
          done

      - name: Unit tests
        run: node test-api-handlers.js

  smoke-test:
    runs-on: ubuntu-latest
    needs: validate
    # Only runs after a successful Vercel deploy on main
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Smoke-test public pages
        run: |
          urls=(
            "https://freeruncellars.com"
            "https://freeruncellars.com/pages/wines"
            "https://freeruncellars.com/pages/events-calendar"
            "https://freeruncellars.com/pages/about"
            "https://freeruncellars.com/pages/gallery"
            "https://freeruncellars.com/pages/contact"
            "https://freeruncellars.com/pages/event-packages"
            "https://freeruncellars.com/pages/live-music-sundays"
            "https://freeruncellars.com/pages/reviews"
          )
          for url in "${urls[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" != "200" ]; then
              echo "FAIL: $url returned $status"
              exit 1
            else
              echo "OK: $url"
            fi
          done

      - name: Smoke-test staff tools
        run: |
          urls=(
            "https://freeruncellars.com/tools/dashboard"
            "https://freeruncellars.com/tools/vineyard-season"
            "https://freeruncellars.com/tools/healthcheck"
          )
          for url in "${urls[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" != "200" ]; then
              echo "FAIL: $url returned $status"
              exit 1
            else
              echo "OK: $url"
            fi
          done

      - name: Smoke-test API endpoints
        run: |
          BASE="https://freeruncellars.com"

          # Calendar feed — GET, unauthenticated, should return 200
          status=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/calendar")
          [ "$status" = "200" ] || { echo "FAIL: /api/calendar returned $status (expected 200)"; exit 1; }
          echo "OK: /api/calendar"

          # frost-alert — POST without password must return 401 (auth gate)
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" -d "{}" \
            "$BASE/api/frost-alert")
          [ "$status" = "401" ] || { echo "FAIL: /api/frost-alert auth gate returned $status (expected 401)"; exit 1; }
          echo "OK: /api/frost-alert auth gate"

          # poynt-sales — POST without password must return 401 (auth gate)
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" -d "{}" \
            "$BASE/api/poynt-sales")
          [ "$status" = "401" ] || { echo "FAIL: /api/poynt-sales auth gate returned $status (expected 401)"; exit 1; }
          echo "OK: /api/poynt-sales auth gate"
