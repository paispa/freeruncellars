<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Photos from Free Run Cellars</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
          <!-- Header -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <img src="https://img1.wsimg.com/isteam/ip/e003f7b8-bd50-4872-a2d0-83a80d992e8e/blob-d682120.png/:/rs=h:74,cg:true,m/qt=q:95"
                alt="Free Run Cellars" height="38"
                style="filter:brightness(0) invert(1);display:block;margin:0 auto;">
            </td>
          </tr>
          <!-- Thin sage line -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <div style="width:80px;height:1px;background:linear-gradient(90deg,transparent,#739885,transparent);margin:0 auto;"></div>
            </td>
          </tr>
          <!-- Headline -->
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <p style="margin:0;font-family:'Georgia',serif;font-size:28px;font-style:italic;font-weight:300;color:#ffffff;letter-spacing:1px;">
                Three perfect moments.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <p style="margin:0;font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#4e6e5d;">
                {{date}}
              </p>
            </td>
          </tr>
          <!-- Photo strip (composited single image) -->
          <tr>
            <td align="center" style="padding-bottom:12px;">
              <img src="{{photo_1}}" alt="Your photo strip"
                style="display:block;width:100%;height:auto;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,0.6);">
            </td>
          </tr>
          <!-- Photo link fallback (visible when images are blocked) -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <a href="{{photo_1}}" style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#739885;text-decoration:none;border-bottom:1px solid #4e6e5d;">
                View &amp; download your photo strip →
              </a>
            </td>
          </tr>
          <!-- Note -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <p style="margin:0;font-family:'Georgia',serif;font-size:16px;font-style:italic;font-weight:300;color:#a0b8a8;line-height:1.7;text-align:center;">
                {{note}}
              </p>
            </td>
          </tr>
          <!-- Divider -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <div style="width:60px;height:1px;background:linear-gradient(90deg,transparent,#4e6e5d,transparent);margin:0 auto;"></div>
            </td>
          </tr>
          <!-- Review nudge -->
          <tr>
            <td align="center" style="padding-bottom:10px;">
              <p style="margin:0;font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#4e6e5d;">
                Loved your visit?
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <a href="https://g.page/r/CYbLnDx6hWxXEAE/review"
                style="display:inline-block;padding:12px 28px;background:#739885;border-radius:8px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#000000;text-decoration:none;">
                Leave Us a Review ✦
              </a>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center">
              <p style="margin:0;font-family:'Helvetica Neue',Arial,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#2a3d30;line-height:2;">
                Free Run Cellars · 10062 Burgoyne Rd, Berrien Springs MI<br>
                freeruncellars.com
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
