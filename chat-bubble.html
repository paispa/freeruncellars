<!-- ── Free Run Cellars Chat Bubble ── -->
<!-- Paste this just before </body> on every page -->

<div id="frc-chat">

  <!-- Bubble trigger button -->
  <button id="frc-chat-btn" aria-label="Chat with us">
    <span class="frc-chat-icon-closed">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </span>
    <span class="frc-chat-icon-open">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </span>
    <span class="frc-unread" id="frcUnread" style="display:none">1</span>
  </button>

  <!-- Chat window -->
  <div id="frc-chat-window" role="dialog" aria-label="Chat with Free Run Cellars">
    <div class="frc-chat-header">
      <div class="frc-header-left">
        <div class="frc-avatar">🍷</div>
        <div>
          <div class="frc-header-name">Free Run Cellars</div>
          <div class="frc-header-status"><span class="frc-dot"></span>Here to help</div>
        </div>
      </div>
      <button class="frc-close-btn" id="frcClose" aria-label="Close chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="frc-messages" id="frcMessages">
      <!-- Greeting injected by JS -->
    </div>

    <!-- Quick replies -->
    <div class="frc-quick-replies" id="frcQuickReplies">
      <button class="frc-qr" data-q="What are your hours?">Hours</button>
      <button class="frc-qr" data-q="Tell me about your wines">Wines</button>
      <button class="frc-qr" data-q="I'm interested in a private event">Private Events</button>
      <button class="frc-qr" data-q="Is there live music this Sunday?">Live Music</button>
    </div>

    <div class="frc-input-row">
      <input type="text" id="frcInput" placeholder="Ask us anything…" autocomplete="off" maxlength="300">
      <button id="frcSend" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<style>
/* ── Chat variables ── */
#frc-chat {
  --teal: #537f71;
  --teal-dk: #3d6357;
  --teal-lt: rgba(83,127,113,0.12);
  --bg: #ffffff;
  --bg2: #f7f9f8;
  --border: rgba(83,127,113,0.18);
  --text: #1a2820;
  --muted: #6b8c7e;
  --radius: 18px;
  --shadow: 0 20px 60px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.08);
  font-family: 'Montserrat', -apple-system, sans-serif;
  position: fixed;
  bottom: 24px; right: 24px;
  z-index: 99999;
}

/* ── Trigger button ── */
#frc-chat-btn {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-dk), var(--teal));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  box-shadow: 0 4px 20px rgba(83,127,113,0.45);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
  position: relative;
  margin-left: auto;
}
#frc-chat-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 28px rgba(83,127,113,0.55);
}
.frc-chat-icon-closed, .frc-chat-icon-open {
  position: absolute;
  transition: opacity 0.2s, transform 0.2s;
}
.frc-chat-icon-open { opacity: 0; transform: rotate(-90deg) scale(0.7); }
#frc-chat.open .frc-chat-icon-closed { opacity: 0; transform: rotate(90deg) scale(0.7); }
#frc-chat.open .frc-chat-icon-open { opacity: 1; transform: rotate(0) scale(1); }

.frc-unread {
  position: absolute; top: -3px; right: -3px;
  width: 18px; height: 18px; border-radius: 50%;
  background: #e05c5c; color: #fff;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #fff;
  animation: frcPulse 2s ease-in-out infinite;
}
@keyframes frcPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* ── Chat window ── */
#frc-chat-window {
  position: absolute;
  bottom: 68px; right: 0;
  width: 340px;
  background: var(--bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  opacity: 0; pointer-events: none;
  transform: translateY(12px) scale(0.97);
  transform-origin: bottom right;
  transition: opacity 0.25s cubic-bezier(0.34,1.56,0.64,1),
              transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  max-height: 520px;
}
#frc-chat.open #frc-chat-window {
  opacity: 1; pointer-events: auto;
  transform: translateY(0) scale(1);
}

/* ── Header ── */
.frc-chat-header {
  background: linear-gradient(135deg, var(--teal-dk), var(--teal));
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.frc-header-left { display: flex; align-items: center; gap: 10px; }
.frc-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.frc-header-name {
  font-size: 13px; font-weight: 700;
  color: #fff; letter-spacing: 0.3px;
}
.frc-header-status {
  font-size: 10px; color: rgba(255,255,255,0.8);
  display: flex; align-items: center; gap: 5px;
  margin-top: 1px;
}
.frc-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #7fffb0;
  box-shadow: 0 0 6px rgba(127,255,176,0.8);
}
.frc-close-btn {
  background: rgba(255,255,255,0.15); border: none;
  color: #fff; cursor: pointer;
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.frc-close-btn:hover { background: rgba(255,255,255,0.25); }

/* ── Messages ── */
.frc-messages {
  flex: 1; overflow-y: auto;
  padding: 16px; display: flex;
  flex-direction: column; gap: 10px;
  scroll-behavior: smooth;
  min-height: 220px; max-height: 300px;
}
.frc-messages::-webkit-scrollbar { width: 4px; }
.frc-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.frc-msg {
  display: flex; gap: 8px;
  animation: frcMsgIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes frcMsgIn {
  from { opacity: 0; transform: translateY(8px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.frc-msg.user { flex-direction: row-reverse; }

.frc-bubble {
  max-width: 82%; padding: 10px 14px;
  border-radius: 16px; font-size: 13px;
  line-height: 1.55; color: var(--text);
}
.frc-msg.bot .frc-bubble {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.frc-msg.user .frc-bubble {
  background: linear-gradient(135deg, var(--teal-dk), var(--teal));
  color: #fff;
  border-bottom-right-radius: 4px;
}

/* Typing indicator */
.frc-typing .frc-bubble {
  padding: 12px 16px;
  display: flex; gap: 4px; align-items: center;
}
.frc-typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); opacity: 0.5;
  animation: frcTyping 1.2s ease-in-out infinite;
}
.frc-typing-dot:nth-child(2) { animation-delay: 0.2s; }
.frc-typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes frcTyping {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* ── Quick replies ── */
.frc-quick-replies {
  padding: 0 12px 10px;
  display: flex; flex-wrap: wrap; gap: 6px;
  flex-shrink: 0;
}
.frc-qr {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--teal-dk); border-radius: 20px;
  padding: 5px 12px; font-size: 11px; font-weight: 600;
  letter-spacing: 0.3px; cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.frc-qr:hover {
  background: var(--teal-lt); border-color: var(--teal);
  color: var(--teal-dk);
}

/* ── Input row ── */
.frc-input-row {
  display: flex; gap: 8px;
  padding: 10px 12px 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0; background: var(--bg);
}
#frcInput {
  flex: 1; border: 1px solid var(--border);
  border-radius: 24px; padding: 9px 14px;
  font-size: 13px; font-family: inherit;
  background: var(--bg2); color: var(--text);
  outline: none; transition: border-color 0.2s;
}
#frcInput:focus { border-color: var(--teal); background: #fff; }
#frcInput::placeholder { color: var(--muted); }
#frcSend {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-dk), var(--teal));
  border: none; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; align-self: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
#frcSend:hover { transform: scale(1.08); box-shadow: 0 3px 12px rgba(83,127,113,0.4); }
#frcSend:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── Lead capture form ── */
.frc-lead-form {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-top: 4px;
}
.frc-lead-form input {
  width: 100%; border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  font-size: 12px; font-family: inherit;
  background: #fff; color: var(--text);
  margin-bottom: 8px; outline: none;
  transition: border-color 0.2s; box-sizing: border-box;
}
.frc-lead-form input:focus { border-color: var(--teal); }
.frc-lead-submit {
  width: 100%; background: linear-gradient(135deg, var(--teal-dk), var(--teal));
  color: #fff; border: none; border-radius: 8px;
  padding: 9px; font-size: 12px; font-weight: 700;
  letter-spacing: 0.5px; cursor: pointer; font-family: inherit;
  transition: opacity 0.2s;
}
.frc-lead-submit:hover { opacity: 0.9; }

/* Mobile */
@media (max-width: 400px) {
  #frc-chat { bottom: 16px; right: 16px; }
  #frc-chat-window { width: calc(100vw - 32px); right: 0; }
}
</style>

<script>
(function() {
  // ── Config ──────────────────────────────────────────────
  // On Vercel this hits /api/chat on the same domain
  // When opening locally, falls back gracefully
  const API_URL = '/api/chat';

  const GREETING = "Hi there! 👋 Welcome to Free Run Cellars. I'm here to help with anything — wines, hours, events, or planning a visit. What can I help you with today?";

  // ── State ───────────────────────────────────────────────
  let messages = []; // conversation history sent to API
  let isOpen = false;
  let isTyping = false;
  let greeted = false;
  let leadCaptured = false;

  // ── Elements ─────────────────────────────────────────────
  const wrap       = document.getElementById('frc-chat');
  const btn        = document.getElementById('frc-chat-btn');
  const win        = document.getElementById('frc-chat-window');
  const msgList    = document.getElementById('frcMessages');
  const input      = document.getElementById('frcInput');
  const sendBtn    = document.getElementById('frcSend');
  const quickReplies = document.getElementById('frcQuickReplies');
  const unread     = document.getElementById('frcUnread');
  const closeBtn   = document.getElementById('frcClose');

  // ── Toggle open/close ───────────────────────────────────
  function toggle() {
    isOpen = !isOpen;
    wrap.classList.toggle('open', isOpen);
    if (isOpen) {
      unread.style.display = 'none';
      if (!greeted) {
        greeted = true;
        setTimeout(() => addBotMessage(GREETING), 300);
      }
      setTimeout(() => input.focus(), 350);
    }
  }

  btn.addEventListener('click', toggle);
  closeBtn.addEventListener('click', toggle);

  // ── Add messages ─────────────────────────────────────────
  function addBotMessage(text, showForm) {
    const div = document.createElement('div');
    div.className = 'frc-msg bot';
    div.innerHTML = `<div class="frc-bubble">${text.replace(/\n/g, '<br>')}</div>`;
    msgList.appendChild(div);

    if (showForm) {
      setTimeout(() => addLeadForm(), 400);
    }
    scrollBottom();
  }

  function addUserMessage(text) {
    // Hide quick replies after first message
    quickReplies.style.display = 'none';

    const div = document.createElement('div');
    div.className = 'frc-msg user';
    div.innerHTML = `<div class="frc-bubble">${escHtml(text)}</div>`;
    msgList.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'frc-msg bot frc-typing';
    div.id = 'frcTyping';
    div.innerHTML = `<div class="frc-bubble">
      <div class="frc-typing-dot"></div>
      <div class="frc-typing-dot"></div>
      <div class="frc-typing-dot"></div>
    </div>`;
    msgList.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('frcTyping');
    if (t) t.remove();
  }

  function addLeadForm() {
    if (leadCaptured) return;
    const div = document.createElement('div');
    div.className = 'frc-msg bot';
    div.innerHTML = `
      <div class="frc-bubble" style="padding:0;background:transparent;border:none;max-width:100%">
        <div class="frc-lead-form">
          <input type="text" id="frcLeadName" placeholder="Your name" autocomplete="name">
          <input type="email" id="frcLeadEmail" placeholder="Your email" autocomplete="email">
          <button class="frc-lead-submit" id="frcLeadSubmit">Send my details →</button>
        </div>
      </div>`;
    msgList.appendChild(div);
    scrollBottom();

    document.getElementById('frcLeadSubmit').addEventListener('click', submitLead);
  }

  function submitLead() {
    const name  = document.getElementById('frcLeadName').value.trim();
    const email = document.getElementById('frcLeadEmail').value.trim();
    if (!name || !email) {
      document.getElementById('frcLeadName').style.borderColor = name ? '' : '#e05c5c';
      document.getElementById('frcLeadEmail').style.borderColor = email ? '' : '#e05c5c';
      return;
    }
    leadCaptured = true;

    // Remove the form
    document.getElementById('frcLeadSubmit').closest('.frc-msg').remove();

    // Show confirmation
    addBotMessage(`Perfect, thank you ${name}! 🍷 We'll be in touch at ${email} within 24 hours. In the meantime, feel free to ask anything else about the winery.`);

    // Send to our API to forward to contact@frcwine.com
    fetch(API_URL.replace('chat', 'lead'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, source: 'chat' })
    }).catch(() => {}); // silent fail — don't disrupt chat UX

    // Also add to messages so AI knows lead was captured
    messages.push({ role: 'assistant', content: `[Lead captured: ${name}, ${email}]` });
  }

  // ── Send message ─────────────────────────────────────────
  async function sendMessage(text) {
    if (!text || isTyping) return;
    text = text.trim();
    if (!text) return;

    addUserMessage(text);
    input.value = '';
    sendBtn.disabled = true;
    isTyping = true;

    // Add to history
    messages.push({ role: 'user', content: text });

    // Show typing
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });

      removeTyping();

      if (!res.ok) throw new Error('API error');

      const data = await res.json();
      const reply = data.reply || "I'm sorry, something went wrong. Please call us at (269) 815-6885 and we'll be happy to help!";

      messages.push({ role: 'assistant', content: reply });

      // Check if reply is asking for contact info — show form
      const wantsLead = !leadCaptured && (
        reply.toLowerCase().includes('name and email') ||
        reply.toLowerCase().includes('reach out') ||
        reply.toLowerCase().includes('get back to you') ||
        reply.toLowerCase().includes('follow up')
      );

      addBotMessage(reply, wantsLead);

    } catch (err) {
      removeTyping();
      addBotMessage("I'm having a little trouble connecting right now. Give us a call at (269) 815-6885 or email contact@frcwine.com and we'll be happy to help!");
    }

    isTyping = false;
    sendBtn.disabled = false;
    input.focus();
  }

  // ── Events ───────────────────────────────────────────────
  sendBtn.addEventListener('click', () => sendMessage(input.value));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input.value);
    }
  });

  // Quick replies
  document.querySelectorAll('.frc-qr').forEach(btn => {
    btn.addEventListener('click', () => sendMessage(btn.dataset.q));
  });

  // ── Helpers ──────────────────────────────────────────────
  function scrollBottom() {
    setTimeout(() => msgList.scrollTop = msgList.scrollHeight, 50);
  }
  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Show unread badge after 4s if not opened
  setTimeout(() => {
    if (!isOpen) unread.style.display = 'flex';
  }, 4000);

})();
</script>
